<meta charset="UTF-8">

<title>Store 144 Top Cap Plan</title>
<style>
  :root{
    --pine: #1f3a2e;
    --pine-deep: #142720;
    --cream: #f2ede1;
    --tag: #f7f3e8;
    --cranberry: #a3273c;
    --gold: #b8923f;
    --ink: #241c14;
    --line: #d8cfb8;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background: var(--pine-deep);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(184,146,63,0.10), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(163,39,60,0.12), transparent 50%);
    color: var(--ink);
    font-family: "Iowan Old Style", "Georgia", serif;
    min-height: 100vh;
  }

  .wrap{
    max-width: 780px;
    margin: 0 auto;
    padding: 28px 18px 60px;
  }

  header{
    text-align:center;
    color: var(--cream);
    padding: 18px 0 26px;
  }

  .eyebrow{
    font-family: "Courier New", monospace;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--gold);
    margin: 0 0 10px;
  }

  h1{
    font-family: "Futura", "Trebuchet MS", sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 6vw, 40px);
    letter-spacing: -0.01em;
    margin: 0 0 8px;
  }

  .sub{
    font-size: 14px;
    color: #cfd9cf;
    margin: 0;
  }

  .search-shell{
    background: var(--tag);
    border-radius: 10px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    padding: 6px;
    margin: 22px 0 8px;
  }

  .search-inner{
    position: relative;
  }

  input#q{
    width: 100%;
    font-family: "Courier New", monospace;
    font-size: 17px;
    padding: 16px 46px 16px 18px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--ink);
    outline: none;
  }

  input#q::placeholder{
    color: #8b8371;
  }

  .clear-btn{
    position:absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: transparent;
    color: #9b937f;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    display:none;
  }
  .clear-btn.show{display:block;}

  .meta-row{
    display:flex;
    justify-content: space-between;
    align-items: center;
    color: #b7c2b6;
    font-size: 12px;
    font-family: "Courier New", monospace;
    letter-spacing: 0.04em;
    margin: 0 4px 18px;
  }

  #count{color: var(--gold);}

  .results{
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card{
    background: var(--tag);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-left: 5px solid var(--cranberry);
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    animation: rise 0.25s ease both;
  }

  .card.pine{ border-left-color: var(--pine); }
  .card.gold{ border-left-color: var(--gold); }

  @keyframes rise{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .capnum{
    font-family: "Futura", "Trebuchet MS", sans-serif;
    font-weight: 800;
    font-size: 26px;
    color: var(--pine);
    min-width: 54px;
    text-align: center;
    line-height: 1;
  }

  .capnum span{
    display:block;
    font-family: "Courier New", monospace;
    font-weight: 400;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--gold);
    margin-top: 4px;
  }

  .divider{
    width: 1px;
    align-self: stretch;
    background: var(--line);
  }

  .content{
    flex: 1;
    min-width: 0;
  }

  .desc{
    font-size: 15.5px;
    line-height: 1.35;
    margin: 0 0 4px;
  }

  .desc mark{
    background: rgba(184,146,63,0.35);
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  .section-label{
    font-family: "Courier New", monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--cranberry);
  }

  .section-label.none{ visibility: hidden; }

  .empty{
    text-align: center;
    color: #cfd9cf;
    padding: 50px 20px;
  }

  .empty .big{
    font-family: "Futura", "Trebuchet MS", sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: var(--cream);
    margin-bottom: 8px;
  }

  .idle{
    text-align:center;
    color: #9fb0a2;
    padding: 60px 20px 30px;
    font-size: 14px;
  }

  footer{
    text-align:center;
    color: #7c8a7d;
    font-size: 11px;
    font-family: "Courier New", monospace;
    margin-top: 34px;
    letter-spacing: 0.05em;
  }

  @media (max-width: 480px){
    .capnum{ font-size: 22px; min-width: 44px; }
    .desc{ font-size: 14.5px; }
  }
</style>

const accentClasses = ["", "pine", "gold"];

function escapeHtml(str){
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, terms){
  let out = escapeHtml(text);
  terms.forEach(t => {
    if(!t) return;
    const esc = t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    out = out.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
  });
  return out;
}

const resultsEl = document.getElementById('results');
const countEl = document.getElementById('count');
const pluralEl = document.getElementById('plural');
const input = document.getElementById('q');
const clearBtn = document.getElementById('clearBtn');

function render(query){
  const q = query.trim().toLowerCase();
  clearBtn.classList.toggle('show', q.length > 0);

  if(!q){
    resultsEl.innerHTML = `<div class="idle">Start typing a description, category, or top cap number above.</div>`;
    countEl.textContent = '0';
    pluralEl.textContent = 'es';
    return;
  }

  const terms = q.split(/\s+/).filter(Boolean);
  const matches = DATA.filter(item => {
    const hay = (item.num + ' ' + item.desc + ' ' + item.section).toLowerCase();
    return terms.every(t => hay.includes(t));
  });

  countEl.textContent = matches.length;
  pluralEl.textContent = matches.length === 1 ? '' : 'es';

  if(matches.length === 0){
    resultsEl.innerHTML = `<div class="empty"><div class="big">No top cap found</div>Try a shorter or different word — e.g. "silver", "bags", "candles".</div>`;
    return;
  }

  resultsEl.innerHTML = matches.map((item, i) => `
    <div class="card ${accentClasses[i % accentClasses.length]}">
      <div class="capnum">${item.num}<span>TOP CAP</span></div>
      <div class="divider"></div>
      <div class="content">
        <p class="desc">${highlight(item.desc, terms)}</p>
        <span class="section-label ${item.section ? '' : 'none'}">${item.section ? escapeHtml(item.section) : 'x'}</span>
      </div>
    </div>
  `).join('');
}

input.addEventListener('input', e => render(e.target.value));
clearBtn.addEventListener('click', () => {
  input.value = '';
  render('');
  input.focus();
});
